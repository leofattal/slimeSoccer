<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Slime Soccer</title>
<style>
  /* ---- Design tokens ---------------------------------------------------- */
  :root{
    --sky-top:#1a1033;
    --sky-bot:#2d1b4e;
    --panel:#120b22;
    --panel-2:#1d1338;
    --line:rgba(255,255,255,.85);
    --p1:#2dd4ff;      /* player slime - electric cyan */
    --p1-rim:#0ea5d4;
    --p2:#ff6b4a;      /* cpu slime - warm vermilion  */
    --p2-rim:#e0431f;
    --gold:#ffd24a;
    --gold-dim:#a9842a;
    --text:#f3eefb;
    --muted:#9c8fc0;
    --good:#56e08a;
    --bad:#ff6b6b;
    --font: "Trebuchet MS", "Segoe UI", system-ui, sans-serif;
    --display: "Arial Black", "Arial Bold", Impact, var(--font);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    background:radial-gradient(120% 90% at 50% 0%,var(--sky-bot),var(--sky-top) 70%,#0c0719 100%);
    color:var(--text);font-family:var(--font);
    display:flex;align-items:center;justify-content:center;
    height:100vh;height:100dvh;padding:10px;overflow:hidden;touch-action:none;
  }
  /* ---- Stage ------------------------------------------------------------ */
  #stage{position:relative;width:min(100%,960px);aspect-ratio:900/480;
    max-height:100%;border-radius:14px;overflow:hidden;
    box-shadow:0 24px 60px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.06);
    user-select:none;touch-action:none;}
  canvas{display:block;width:100%;height:100%}

  /* ---- HUD -------------------------------------------------------------- */
  #hud{position:absolute;inset:0;pointer-events:none;
    display:flex;justify-content:space-between;align-items:flex-start;
    padding:12px 16px;font-weight:bold;}
  .hud-side{font-size:clamp(11px,1.6vw,15px);color:var(--muted);letter-spacing:.5px}
  #score{font-family:var(--display);font-size:clamp(22px,4.2vw,40px);
    letter-spacing:2px;line-height:1;display:flex;gap:14px;align-items:center;
    text-shadow:0 2px 0 rgba(0,0,0,.45)}
  #score .you{color:var(--p1)} #score .cpu{color:var(--p2)} #score .dash{color:var(--muted);font-size:.7em}
  #coins{color:var(--gold);font-size:clamp(13px,2.2vw,20px);
    text-shadow:0 2px 0 rgba(0,0,0,.45)}

  /* ---- Touch controls --------------------------------------------------- */
  #touch{position:absolute;bottom:10px;left:0;right:0;display:flex;
    justify-content:space-between;padding:0 14px;pointer-events:none;}
  .tgroup{display:flex;gap:8px;pointer-events:auto}
  .tbtn{width:50px;height:50px;border-radius:50%;border:1px solid rgba(255,255,255,.18);
    background:rgba(255,255,255,.08);backdrop-filter:blur(4px);
    color:var(--text);font-size:20px;font-weight:bold;display:flex;
    align-items:center;justify-content:center;opacity:.55;}
  .tbtn:active{opacity:.95;background:rgba(45,212,255,.25)}
  @media(hover:hover) and (pointer:fine){#touch{display:none}}

  /* ---- Shop tabs + cosmetics ------------------------------------------- */
  .tabs{display:flex;gap:8px}
  .tab{font-family:var(--font);font-weight:bold;cursor:pointer;
    background:#1d1338;border:1px solid rgba(255,255,255,.1);color:var(--muted);
    padding:8px 22px;border-radius:9px;font-size:clamp(13px,2.6vw,15px)}
  .tab.active{background:var(--p1);color:#0c0719;border-color:transparent}
  .looks-label{color:var(--muted);font-size:clamp(11px,2.2vw,13px);
    font-weight:bold;text-align:left;width:min(100%,520px);margin:4px 0 2px}
  .swatch-row{display:flex;flex-wrap:wrap;gap:9px;width:min(100%,520px);justify-content:center}
  .swatch{cursor:pointer;border:2px solid transparent;border-radius:11px;
    background:var(--panel-2);padding:8px 10px;display:flex;flex-direction:column;
    align-items:center;gap:5px;min-width:74px;font-size:11px;font-weight:bold;color:var(--text)}
  .swatch .chip{width:30px;height:30px;border-radius:50% 50% 8px 8px;border:1px solid rgba(0,0,0,.3)}
  .swatch .tag2{color:var(--gold)}
  .swatch.owned .tag2{color:var(--muted)}
  .swatch.equipped{border-color:var(--p1);box-shadow:0 0 10px rgba(45,212,255,.4)}
  .swatch.locked{opacity:.55}

  /* ---- Overlays --------------------------------------------------------- */
  .overlay{position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:safe center;gap:14px;text-align:center;
    background:rgba(9,5,20,.82);backdrop-filter:blur(6px);
    padding:18px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
  .hidden{display:none!important}
  h1{font-family:var(--display);font-size:clamp(34px,8vw,64px);margin:0;
    letter-spacing:1px;line-height:.95;
    background:linear-gradient(180deg,#fff,var(--p1));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 4px 0 rgba(0,0,0,.4))}
  .tag{color:var(--muted);max-width:440px;font-size:clamp(12px,2.3vw,15px);line-height:1.5}
  kbd{background:#2a1f47;border:1px solid #43356b;border-bottom-width:2px;
    border-radius:5px;padding:1px 7px;font-family:var(--font);font-size:.9em;color:#fff}
  .btn{font-family:var(--display);letter-spacing:1px;border:none;cursor:pointer;
    color:#0c0719;background:linear-gradient(180deg,#ffe27a,var(--gold));
    padding:14px 34px;border-radius:11px;font-size:clamp(16px,3vw,22px);
    box-shadow:0 6px 0 var(--gold-dim),0 10px 22px rgba(0,0,0,.4);transition:transform .06s}
  .btn:active{transform:translateY(3px);box-shadow:0 3px 0 var(--gold-dim)}
  .btn.cyan{background:linear-gradient(180deg,#9cebff,var(--p1));box-shadow:0 6px 0 #0a7ba0,0 10px 22px rgba(0,0,0,.4)}
  .btn.cyan:active{box-shadow:0 3px 0 #0a7ba0}
  .btn.ghost{background:transparent;color:var(--muted);box-shadow:inset 0 0 0 2px rgba(255,255,255,.16);
    padding:14px 22px}
  .btn.ghost:active{transform:translateY(2px)}
  .btn-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:center}

  /* segmented selectors (mode / difficulty) */
  .seg-label{color:var(--muted);font-size:clamp(10px,2vw,12px);font-weight:bold;
    text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
  .seg{display:inline-flex;background:#160e2c;border:1px solid rgba(255,255,255,.08);
    border-radius:11px;padding:4px;gap:4px}
  .seg button{font-family:var(--font);font-weight:bold;cursor:pointer;border:none;
    background:transparent;color:var(--muted);padding:9px 18px;border-radius:8px;
    font-size:clamp(12px,2.5vw,15px);transition:background .12s}
  .seg button.active{background:var(--p1);color:#0c0719}
  #diffWrap.dim{opacity:.35;pointer-events:none}
  .online-join{display:flex;gap:8px;align-items:center;justify-content:center;margin-top:10px}
  #joinCode{width:150px;text-transform:uppercase;text-align:center;letter-spacing:3px;
    font-family:var(--display);font-size:20px;padding:11px;border-radius:9px;border:none;
    background:#160e2c;color:#fff;outline:none}
  #netStatus{margin-top:10px;min-height:1.3em;color:var(--gold)}

  /* ---- dev console (admin toys) ---------------------------------------- */
  #console{position:absolute;left:0;right:0;bottom:0;height:44%;z-index:60;
    background:rgba(6,10,14,.93);backdrop-filter:blur(3px);
    border-top:1px solid rgba(80,255,140,.35);
    font-family:ui-monospace,Menlo,Consolas,monospace;font-size:13px;color:#7CFC9A;
    display:flex;flex-direction:column}
  #consoleLog{flex:1;overflow-y:auto;padding:10px 12px;white-space:pre-wrap;line-height:1.5}
  #consoleLog .cmd{color:#fff}
  #consoleLog .err{color:#ff6b6b}
  #consoleLog .ok{color:#7CFC9A}
  #consoleRow{display:flex;align-items:center;gap:8px;padding:9px 12px;
    border-top:1px solid rgba(255,255,255,.1)}
  #consoleRow .prompt{color:#7CFC9A;font-weight:bold}
  #consoleInput{flex:1;background:transparent;border:none;outline:none;color:#fff;
    font-family:inherit;font-size:13px}

  .result{font-family:var(--display);font-size:clamp(26px,6vw,46px);margin:0}
  .result.win{color:var(--good)} .result.lose{color:var(--bad)}
  .earn{color:var(--gold);font-size:clamp(14px,2.6vw,18px);font-weight:bold}

  /* ---- Shop ------------------------------------------------------------- */
  .shop-coins{color:var(--gold);font-weight:bold;font-size:clamp(15px,3vw,20px)}
  #shopGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;
    width:min(100%,520px)}
  .card{background:linear-gradient(180deg,var(--panel-2),var(--panel));
    border:1px solid rgba(255,255,255,.08);border-radius:13px;padding:13px;
    text-align:left;display:flex;flex-direction:column;gap:7px}
  .card .name{font-weight:bold;font-size:clamp(13px,2.6vw,16px);display:flex;
    justify-content:space-between;align-items:center}
  .card .desc{color:var(--muted);font-size:clamp(10px,2vw,12px);line-height:1.4;min-height:2.6em}
  .pips{display:flex;gap:5px}
  .pip{flex:1;height:7px;border-radius:4px;background:#2a1f47}
  .pip.on{background:var(--p1);box-shadow:0 0 8px rgba(45,212,255,.5)}
  .buy{margin-top:2px;border:none;cursor:pointer;border-radius:9px;padding:9px;
    font-weight:bold;font-size:clamp(12px,2.3vw,14px);
    background:linear-gradient(180deg,#ffe27a,var(--gold));color:#0c0719}
  .buy:disabled{background:#2a1f47;color:#6b5e8c;cursor:not-allowed;box-shadow:none}
  .buy.maxed{background:#1f7a3d;color:#cfe}
</style>
</head>
<body>
<div id="stage">
  <canvas id="cv" width="900" height="480"></canvas>

  <!-- Heads-up display -->
  <div id="hud">
    <div class="hud-side" id="matchLabel">Match 1 · First to 5</div>
    <div id="score"><span class="you">0</span><span class="dash">—</span><span class="cpu">0</span></div>
    <div class="hud-side" id="coins">🪙 0</div>
  </div>

  <!-- Touch controls (mobile) -->
  <div id="touch">
    <div class="tgroup">
      <div class="tbtn" data-key="left">◀</div>
      <div class="tbtn" data-key="right">▶</div>
    </div>
    <div class="tgroup">
      <div class="tbtn" data-key="special">★</div>
      <div class="tbtn" data-key="dash">⚡</div>
      <div class="tbtn" data-key="down">▼</div>
      <div class="tbtn" data-key="jump">▲</div>
    </div>
  </div>

  <!-- Start screen -->
  <div class="overlay" id="startScreen">
    <h1>SLIME<br>SOCCER</h1>

    <div class="seg" id="modeSeg">
      <button class="active" data-mode="1p">1 Player</button>
      <button data-mode="2p">2 Players</button>
      <button data-mode="online">Online</button>
    </div>

    <div id="diffWrap">
      <div class="seg-label">CPU difficulty</div>
      <div class="seg" id="diffSeg">
        <button data-diff="easy">Easy</button>
        <button class="active" data-diff="medium">Medium</button>
        <button data-diff="hard">Hard</button>
      </div>
    </div>

    <div id="onlineWrap" class="hidden">
      <div class="seg-label">Cross-device — play a friend online</div>
      <button class="btn cyan" id="hostBtn">HOST GAME</button>
      <div class="online-join">
        <input id="joinCode" maxlength="4" placeholder="CODE" autocomplete="off" spellcheck="false">
        <button class="btn ghost" id="joinBtn">JOIN</button>
      </div>
      <div id="netStatus" class="tag"></div>
    </div>

    <p class="tag" id="howto"></p>
    <button class="btn" id="startBtn">PLAY</button>
  </div>

  <!-- Results + shop -->
  <div class="overlay hidden" id="shopScreen">
    <p class="result" id="resultText"></p>
    <p class="earn" id="earnText"></p>
    <div class="shop-coins" id="coinWrap">🪙 <span id="shopCoins">0</span> coins</div>
    <div id="shopBody">
      <div class="tabs">
        <button class="tab active" data-tab="upgrades">Upgrades</button>
        <button class="tab" data-tab="looks">Looks</button>
      </div>
      <div id="tabUpgrades"><div id="shopGrid"></div></div>
      <div id="tabLooks" class="hidden">
        <div class="looks-label">Slime colour</div>
        <div class="swatch-row" id="colorRow"></div>
        <div class="looks-label">Hat</div>
        <div class="swatch-row" id="hatRow"></div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn cyan" id="nextBtn">NEXT MATCH</button>
      <button class="btn ghost" id="menuBtn">MENU</button>
    </div>
  </div>

  <!-- Hidden dev console (open with the backtick ` key) -->
  <div id="console" class="hidden">
    <div id="consoleLog"></div>
    <div id="consoleRow">
      <span class="prompt">&gt;</span>
      <input id="consoleInput" autocomplete="off" autocapitalize="off" spellcheck="false"
             placeholder="type a command — try: \help">
    </div>
  </div>
</div>

<script type="module">
  /* Trystero = serverless WebRTC matchmaking (no server to run).
     Loaded from CDN; exposes joinRoom to the main script for online play. */
  try {
    const { joinRoom } = await import('https://esm.run/trystero');
    window._trysteroJoin = joinRoom;
  } catch (e) {
    console.warn('Trystero failed to load — online play unavailable offline', e);
  }
</script>
<script>
"use strict";
/* ======================================================================
   SLIME SOCCER  —  single-file, fixed-timestep canvas game
   Sections:  CONFIG → STATE → UPGRADES → INPUT → PHYSICS → AI → RENDER → LOOP
   ====================================================================== */

const cv  = document.getElementById('cv');
const ctx = cv.getContext('2d');
const W = cv.width, H = cv.height;       // logical resolution (physics units)
const GROUND_Y   = H - 52;               // y of the pitch surface
const GOAL_H     = 150;                   // height of the goal opening
const NET_W      = 40;                    // visual depth of the net
const MID        = W / 2;

/* ---- tuning constants (tweak these to change game feel) --------------- */
const SLIME_GRAV = 0.62;
const BALL_GRAV  = 0.42;
const AIR        = 0.997;                 // horizontal air drag on ball
const GROUND_REST= 0.72;                  // ball bounciness off the floor
const WALL_REST  = 0.74;
const MAX_BALL   = 21;                    // speed cap stops runaway physics
const STEP       = 1000/60;               // fixed physics step (ms)
const SUPER_HITS = 5;                      // ball touches needed to unlock the Super Shot

/* ---- base slime stats (before upgrades) ------------------------------- */
const BASE = { r:52, speed:5.0, jump:13.2, power:2.0 };

/* ---- AI difficulty presets -------------------------------------------- */
/* speed/jump = movement; err = aim wobble (px, higher = worse); dead =
   how lazily it tracks the ball; cd = strike cooldown (higher = slower) */
const DIFF = {
  easy:   { label:'Easy',   speed:3.0, jump:11.0, err:95, dead:32, cd:36 },
  medium: { label:'Medium', speed:4.2, jump:12.6, err:55, dead:18, cd:24 },
  hard:   { label:'Hard',   speed:5.3, jump:14.0, err:22, dead:9,  cd:15 },
};

/* ======================================================================
   STATE
   ====================================================================== */
let scene = 'start';   // 'start' | 'play' | 'shop'
let coins = 0;
let matchNo = 1;
const TARGET = 5;      // goals to win a match

let player, cpu, ball;
let scoreYou = 0, scoreCpu = 0;
let goalFreeze = 0;    // frames to pause after a goal
let shake = 0;         // screen-shake magnitude
let serveDir = 1;      // which way the ball serves after a goal
let prevDash1 = false, prevDash2 = false;  // dash edge-detection per player
let prevSpecial1 = false, prevSpecial2 = false;  // special edge-detection per player
let mode = '1p';       // '1p' | '2p'
let difficulty = 'medium';

/* ---- admin / dev-console state (the hidden streamer toys) -------------- */
/* world-wide effects live here; per-slime effects (size/super/freeze) live
   on each slime object so commands can target p1, p2, or both. */
const cheats = { gravityMul:1, timeScale:1, ballR:18, disco:false,
                 ballFrozen:false, bounce:1, paused:false, flip:false, quake:false };
let consoleOpen = false;
let winScore = TARGET;              // goals to win — editable via \goals

/* ---- online (cross-device) state -------------------------------------- */
let netRole = null;                 // null | 'host' | 'guest'
let room = null, sendInput = null, sendState = null;
let netGuestInput = { left:false,right:false,jump:false,down:false,dash:false,special:false };
let guestScene = 'start';           // guest mirrors host's scene
let netConnected = false;
let netCode = '';

/* ---- player upgrade levels (persist across matches in one session) ----
   To keep saves between visits when you host this yourself, read/write
   `upg` to localStorage here — it's only disabled inside Claude artifacts. */
const upg = { speed:0, jump:0, size:0, power:0 };

/* ======================================================================
   UPGRADES  —  definition drives both the shop UI and the stat math
   ====================================================================== */
const UPGRADES = [
  { key:'speed', name:'Speed',  max:5,
    desc:'Move left and right faster.',
    cost:l => 10 + l*8 },
  { key:'jump',  name:'Jump',   max:5,
    desc:'Jump higher to reach lobbed balls.',
    cost:l => 10 + l*8 },
  { key:'size',  name:'Size',   max:4,
    desc:'Bigger dome covers more goal. Trade-off: a touch slower.',
    cost:l => 14 + l*12 },
  { key:'power', name:'Power',  max:5,
    desc:'Smack the ball harder off your head.',
    cost:l => 12 + l*10 },
];

/* derive a slime's live stats from the upgrade levels */
function playerStats(){
  const sizeBonus = upg.size * 7;
  return {
    r:    (BASE.r + sizeBonus) * player.sizeMul,
    // size makes you slightly slower — the honest trade-off
    speed: BASE.speed + upg.speed*0.6 - upg.size*0.18,
    jump:  BASE.jump + upg.jump*1.15,
    power: BASE.power + upg.power*1.6,
  };
}

/* ======================================================================
   COSMETICS  —  purely visual, never touch balance (these are sellable)
   ====================================================================== */
const COLORS = [
  { key:'cyan',    name:'Cyan',    color:'#2dd4ff', rim:'#0ea5d4', cost:0  },
  { key:'sunset',  name:'Sunset',  color:'#ff9d5c', rim:'#e0431f', cost:8  },
  { key:'lime',    name:'Lime',    color:'#9be564', rim:'#4e9e2e', cost:8  },
  { key:'magenta', name:'Magenta', color:'#ff6bd6', rim:'#c41fa0', cost:10 },
  { key:'ghost',   name:'Ghost',   color:'#e8e8f5', rim:'#9a9ab5', cost:12 },
  { key:'gold',    name:'Gold',    color:'#ffd24a', rim:'#a9842a', cost:16 },
];
const HATS = [
  { key:'none',  name:'None',     cost:0  },
  { key:'band',  name:'Headband', cost:6  },
  { key:'cap',   name:'Cap',      cost:8  },
  { key:'party', name:'Party',    cost:10 },
  { key:'top',   name:'Top Hat',  cost:14 },
  { key:'crown', name:'Crown',    cost:20 },
];
let looks;   // { ownedColors:Set, ownedHats:Set, color, hat }  — set in startGame
function resetLooks(){
  looks = { ownedColors:new Set(['cyan']), ownedHats:new Set(['none']),
            color:'cyan', hat:'none' };
}
function equippedColor(){ return COLORS.find(c=>c.key===looks.color); }


function makeSlime(x, color, rim, isPlayer){
  return { x, y:GROUND_Y, vx:0, vy:0, onGround:true,
           r:BASE.r, speed:BASE.speed, jump:BASE.jump, power:BASE.power,
           dashTimer:0, dashCd:0, dashDir:1, jumpCd:0,
           charge:0, superReady:false, superArmed:false, armT:0,
           sizeMul:1, infSuper:false, frozen:false,
           speedMul:1, jumpMul:1, fly:false, invisible:false,
           reversed:false, drunk:false, ice:false,
           color, rim, isPlayer };
}

function resetPositions(){
  const ps = playerStats();
  Object.assign(player, ps);
  player.x = W*0.22; player.y = GROUND_Y; player.vx = 0; player.vy = 0; player.onGround = true;
  cpu.x = W*0.78;   cpu.y = GROUND_Y;   cpu.vx = 0; cpu.vy = 0; cpu.onGround = true;
  // The conceding side restarts with the ball. Drop it OFFSET from the slime
  // (so it never lands on the head) and drift it toward midfield — never
  // backward into your own goal. A little jitter keeps serves varied.
  const onLeft = serveDir < 0;                 // <0 = player's (left) half
  const bx  = (onLeft ? W*0.40 : W*0.60) + (Math.random()-0.5)*60;
  const bvx = (onLeft ? 0.9 : -0.9) + (Math.random()-0.5)*0.6;
  ball = { x: bx, y: 70, vx: bvx, vy: 0, r:cheats.ballR, angle:0, flameT:0 };
}

function newMatch(){
  scoreYou = 0; scoreCpu = 0;
  cpu.r = BASE.r * cpu.sizeMul;
  for(const s of [player, cpu]){ s.charge = 0; s.superReady = false; s.superArmed = false; s.armT = 0; }
  if(mode==='2p' || mode==='online'){
    // both players equal — fair versus
    cpu.speed = BASE.speed; cpu.jump = BASE.jump; cpu.power = BASE.power;
  } else {
    // CPU strength comes from the chosen difficulty, then ramps a little each match
    const d = DIFF[difficulty];
    cpu.speed = Math.min(6.4, d.speed + matchNo*0.26);
    cpu.jump  = Math.min(15,  d.jump  + matchNo*0.28);
    cpu.power = 1.7 + matchNo*0.12;
  }
  serveDir = Math.random() < 0.5 ? -1 : 1;
  resetPositions();
  updateHUD();
}

/* ======================================================================
   INPUT
   ====================================================================== */
const raw = {};                       // physical keys currently held (by e.code)
const touch = { left:false, right:false, jump:false, down:false, dash:false, special:false };
const pad1 = { left:false, right:false, jump:false, down:false, dash:false, special:false };
const pad2 = { left:false, right:false, jump:false, down:false, dash:false, special:false };
let padConnected = false;
const NOINPUT = { left:false, right:false, jump:false, down:false, dash:false, special:false };
const TRACK = new Set([
  'ArrowLeft','ArrowRight','ArrowUp','ArrowDown','ShiftRight','Enter','Slash',
  'KeyA','KeyD','KeyW','KeyS','ShiftLeft','Space','KeyX','KeyF','KeyE'
]);
addEventListener('keydown', e=>{
  const t = e.target;
  if(t && (t.tagName==='INPUT' || t.tagName==='TEXTAREA')) return;   // don't hijack typing in text fields
  if(e.code==='Backquote'){ toggleConsole(); e.preventDefault(); return; }
  if(consoleOpen) return;                       // let the console input field handle keys
  if(TRACK.has(e.code)){ raw[e.code]=true;  e.preventDefault(); }
});
addEventListener('keyup',   e=>{
  const t = e.target;
  if(t && (t.tagName==='INPUT' || t.tagName==='TEXTAREA')) return;
  if(consoleOpen) return;
  if(TRACK.has(e.code)){ raw[e.code]=false; e.preventDefault(); }
});

// touch buttons drive player 1
document.querySelectorAll('.tbtn').forEach(b=>{
  const k = b.dataset.key;
  const on  = e=>{ touch[k]=true;  e.preventDefault(); };
  const off = e=>{ touch[k]=false; e.preventDefault(); };
  b.addEventListener('pointerdown', on);
  b.addEventListener('pointerup', off);
  b.addEventListener('pointerleave', off);
  b.addEventListener('pointercancel', off);
});
// release everything when the tab loses focus
addEventListener('blur', ()=>{ for(const k in raw) raw[k]=false;
  for(const o of [touch,pad1,pad2]) o.left=o.right=o.jump=o.down=o.dash=o.special=false; });

/* ---- Gamepads: poll up to two, once per frame ------------------------- */
addEventListener('gamepadconnected',    ()=>{ padConnected = true;  updateHUD(); });
addEventListener('gamepaddisconnected', ()=>{ padConnected = false; updateHUD(); });
function readPad(gp, out){
  out.left=out.right=out.jump=out.down=out.dash=out.special=false;
  if(!gp) return;
  const ax = gp.axes[0]||0, ay = gp.axes[1]||0;
  const b  = i => gp.buttons[i] && gp.buttons[i].pressed;
  if(ax < -0.4 || b(14)) out.left  = true;
  if(ax >  0.4 || b(15)) out.right = true;
  if(b(0) || b(12) || ay < -0.5) out.jump = true;
  if(b(13) || ay > 0.5) out.down = true;
  if(b(1) || b(2) || b(4) || b(5)) out.dash = true;
  if(b(3)) out.special = true;                 // Y button
}
function pollGamepads(){
  const list = navigator.getGamepads ? [...navigator.getGamepads()].filter(g=>g) : [];
  readPad(list[0], pad1);
  readPad(list[1], pad2);
}

/* Build each player's input for this frame, depending on game mode.
   1P:  player 1 may use arrows OR wasd OR touch OR pad1.
   2P:  player 1 = wasd + LShift + touch + pad1;  player 2 = arrows + RShift + pad2. */
function inputFor(which){
  const r = raw, any = (...ks)=>ks.some(k=>r[k]);
  if(which===1){
    if(mode==='1p' || mode==='online'){
      return {
        left: any('ArrowLeft','KeyA')||touch.left||pad1.left,
        right:any('ArrowRight','KeyD')||touch.right||pad1.right,
        jump: any('ArrowUp','KeyW','Space')||touch.jump||pad1.jump,
        down: any('ArrowDown','KeyS')||touch.down||pad1.down,
        dash: any('ShiftLeft','ShiftRight','KeyX')||touch.dash||pad1.dash,
        special: any('KeyF','KeyE')||touch.special||pad1.special,
      };
    }
    return {
      left:r.KeyA||touch.left||pad1.left, right:r.KeyD||touch.right||pad1.right,
      jump:r.KeyW||touch.jump||pad1.jump, down:r.KeyS||touch.down||pad1.down,
      dash:r.ShiftLeft||touch.dash||pad1.dash,
      special:r.KeyF||touch.special||pad1.special,
    };
  }
  // player 2 (2P only)
  return {
    left:r.ArrowLeft||pad2.left, right:r.ArrowRight||pad2.right,
    jump:r.ArrowUp||pad2.jump,   down:r.ArrowDown||pad2.down,
    dash:r.ShiftRight||r.Enter||pad2.dash,
    special:r.Slash||pad2.special,
  };
}

/* ======================================================================
   PHYSICS  (one fixed step)
   ====================================================================== */
function clampSpeed(b, max=MAX_BALL){
  const s = Math.hypot(b.vx, b.vy);
  if(s > max){ const f = max/s; b.vx*=f; b.vy*=f; }
}

function moveSlime(s, left, right, jump, dashEdge=false, down=false){
  if(s.dashCd > 0) s.dashCd--;
  // start a dash: needs a direction held and the cooldown ready
  if(dashEdge && s.dashCd===0 && (left||right)){
    s.dashTimer = 8; s.dashCd = 55; s.dashDir = right ? 1 : -1;
  }
  // horizontal: dash burst overrides normal speed while it lasts
  // troll effects: reversed/drunk swap controls; ice makes it slippery
  if(s.reversed){ const t=left; left=right; right=t; }
  if(s.drunk && Math.random()<0.06){ const t=left; left=right; right=t; }
  if(s.dashTimer > 0){
    s.dashTimer--;
    s.vx = s.dashDir * 11.5;
  } else {
    const sp = s.speed * s.speedMul;
    const desired = (right?1:0)*sp - (left?1:0)*sp;
    s.vx = s.ice ? (s.vx*0.9 + desired*0.1) : desired;   // ice = keeps sliding
    if(s.drunk) s.vx += (Math.random()-0.5)*3;
  }
  s.x += s.vx;
  // jump (fly lets a slime jump in mid-air)
  if(jump && (s.onGround || s.fly)){ s.vy = -s.jump * s.jumpMul; s.onGround = false; }
  s.vy += SLIME_GRAV * cheats.gravityMul * (s.fly ? 0.45 : 1);
  // slam: press down in the air to drop fast and spike the ball
  if(down && !s.onGround && s.vy < 17) s.vy = 17;
  s.y += s.vy;
  if(s.y >= GROUND_Y){ s.y = GROUND_Y; s.vy = 0; s.onGround = true; }
  // confine each slime to its own half (classic rule → no slime overlap bugs)
  if(s.isPlayer) s.x = Math.max(s.r, Math.min(MID - 6, s.x));
  else           s.x = Math.max(MID + 6, Math.min(W - s.r, s.x));
}

function ballVsSlime(s){
  const dx = ball.x - s.x, dy = ball.y - s.y;
  let d = Math.hypot(dx, dy);
  // only the upper dome is solid: ball must be at/above the slime centre
  if(d < ball.r + s.r && dy <= 0){
    if(d === 0) d = 0.01;
    const nx = dx/d, ny = dy/d;
    // push the ball out of the slime
    const overlap = ball.r + s.r - d;
    ball.x += nx*overlap; ball.y += ny*overlap;
    // reflect velocity relative to the slime, then add its momentum + a kick
    const rvx = ball.vx - s.vx, rvy = ball.vy - s.vy;
    const dot = rvx*nx + rvy*ny;
    if(dot < 0){ ball.vx -= 2*dot*nx; ball.vy -= 2*dot*ny; }

    if(s.superArmed){
      // SUPER SHOT: huge kick toward the opponent's goal, breaks the speed cap
      const dir = s.isPlayer ? 1 : -1;            // P1 attacks right(+), P2/CPU left(-)
      ball.vx += s.vx*0.45 + nx*(s.power*3 + 8) + dir*9;
      ball.vy += s.vy*0.55 - 4.5;                 // launch it up and out
      clampSpeed(ball, 34);
      s.superArmed = false; s.superReady = false; s.charge = 0; s.armT = 0;
      ball.flameT = 48; shake = 18;
    } else {
      ball.vx += s.vx*0.45 + nx*s.power;
      ball.vy += s.vy*0.55 - 0.6;                 // small upward pop so headers float
      clampSpeed(ball);
      // charge the special: every clean touch counts toward the next unlock
      if(s.charge < SUPER_HITS){ s.charge++; if(s.charge >= SUPER_HITS) s.superReady = true; }
    }
  }
}

/* Arm the Super Shot when the meter is full and the special button is tapped.
   It stays armed for a short window; if you don't strike the ball in time it
   disarms but keeps the charge so you can try again. */
function armSpecial(s, pressedEdge){
  if(pressedEdge && s.superReady && !s.superArmed){ s.superArmed = true; s.armT = 110; }
  if(s.armT > 0){ s.armT--; if(s.armT === 0) s.superArmed = false; }
}

function physicsStep(){
  if(goalFreeze > 0){ goalFreeze--; if(goalFreeze===0) resetPositions(); return; }

  // player 1
  const i1 = player.frozen ? NOINPUT : inputFor(1);
  const dash1 = i1.dash && !prevDash1; prevDash1 = i1.dash;
  moveSlime(player, i1.left, i1.right, i1.jump, dash1, i1.down);
  armSpecial(player, i1.special && !prevSpecial1); prevSpecial1 = i1.special;

  // player 2: networked guest (online host), local human (2P), or AI (1P)
  if(mode==='2p' || (mode==='online' && netRole==='host')){
    const src = (mode==='online') ? netGuestInput : inputFor(2);
    const i2 = cpu.frozen ? NOINPUT : src;
    const dash2 = i2.dash && !prevDash2; prevDash2 = i2.dash;
    moveSlime(cpu, i2.left, i2.right, i2.jump, dash2, i2.down);
    armSpecial(cpu, i2.special && !prevSpecial2); prevSpecial2 = i2.special;
  } else if(mode==='1p'){
    stepAI();
  }
  if(ball.flameT > 0) ball.flameT--;
  for(const s of [player, cpu]){
    if(s.infSuper){ s.charge = SUPER_HITS; s.superReady = true; }
  }

  // --- ball integration ---
  if(cheats.ballFrozen){
    ball.vx = 0; ball.vy = 0;
  } else {
    ball.vy += BALL_GRAV * cheats.gravityMul;
    ball.vx *= AIR;
    ball.x  += ball.vx;
    ball.y  += ball.vy;
    ball.angle += ball.vx * 0.03;
  }

  const REST_G = GROUND_REST * cheats.bounce, REST_W = WALL_REST * cheats.bounce;
  // floor
  if(ball.y + ball.r > GROUND_Y){
    ball.y = GROUND_Y - ball.r;
    ball.vy *= -REST_G;
    ball.vx *= 0.985;
    if(Math.abs(ball.vy) < 1.2) ball.vy = 0;
  }
  // ceiling
  if(ball.y - ball.r < 0){ ball.y = ball.r; ball.vy *= -REST_W; }

  // side walls — solid ABOVE the goal opening, open inside it
  const inOpening = ball.y > GROUND_Y - GOAL_H;
  if(ball.x - ball.r < 0 && !inOpening){ ball.x = ball.r; ball.vx = Math.abs(ball.vx)*REST_W; }
  if(ball.x + ball.r > W && !inOpening){ ball.x = W - ball.r; ball.vx = -Math.abs(ball.vx)*REST_W; }

  ballVsSlime(player);
  ballVsSlime(cpu);
  clampSpeed(ball);

  // --- goals ---
  if(inOpening && ball.x - ball.r <= 2)       goal('cpu');   // ball in your (left) net
  else if(inOpening && ball.x + ball.r >= W-2) goal('you');  // ball in cpu (right) net
}

function goal(who){
  if(who==='you'){ scoreYou++; coins += 3; serveDir = 1; }
  else           { scoreCpu++; serveDir = -1; }
  shake = 14;
  goalFreeze = 55;
  updateHUD();
  if(scoreYou >= winScore || scoreCpu >= winScore){
    goalFreeze = 90;
    setTimeout(endMatch, 900);
  }
}

/* ======================================================================
   AI  —  guard the goal, then strike the ball FORWARD (toward your goal)
   instead of juggling it straight up on its own head.
   ====================================================================== */
function stepAI(){
  if(cpu.frozen){ moveSlime(cpu, false, false, false); return; }
  const cfg = DIFF[difficulty];
  if(cpu.jumpCd > 0) cpu.jumpCd--;
  let left=false, right=false, jump=false;
  const guardX = W*0.8;                         // resting position near its goal
  const onCpuSide = ball.x > MID - 40;          // engage just before the midline
  let target;

  if(!onCpuSide){
    target = guardX;                            // ball on your half → hold position
  } else {
    // predict where the ball is heading, then stand a little to the RIGHT of it.
    // Heading the ball from its right side sends it LEFT toward the player's goal
    // — this offset is what stops the straight-up head-juggling.
    const predicted = ball.x + ball.vx*5;
    target = predicted + cpu.r*0.5;
  }
  // difficulty: easy reacts sloppily (big dead-zone + aim error); aim sharpens as matches go on
  const deadzone = cfg.dead;
  target += (Math.random()-0.5) * Math.max(6, cfg.err - matchNo*6);
  target = Math.max(MID+6, Math.min(W - cpu.r, target));

  if(cpu.x < target - deadzone) right = true;
  else if(cpu.x > target + deadzone) left = true;

  // Only jump to STRIKE a DESCENDING ball in front-of/under the head, with a
  // cooldown. All three together break the bounce-on-head loop.
  const dx = ball.x - cpu.x;                     // <0 means ball is left of head
  const inStrikeX = dx > -cpu.r*1.1 && dx < cpu.r*0.25;
  const descending = ball.vy > -1;
  const inStrikeY = ball.y > GROUND_Y - cpu.r - 95 && ball.y < GROUND_Y - cpu.r + 18;
  if(cpu.onGround && onCpuSide && inStrikeX && descending && inStrikeY && cpu.jumpCd===0){
    jump = true;
    cpu.jumpCd = cfg.cd;
  }

  moveSlime(cpu, left, right, jump);
}

/* ======================================================================
   RENDER
   ====================================================================== */
function drawSlime(s){
  if(s.invisible) return;               // \ghost command
  ctx.save();
  // player wears the equipped cosmetic colour; cpu keeps its own
  let col = s.color, rim = s.rim;
  if(s.isPlayer){ const c = equippedColor(); col = c.color; rim = c.rim; }
  // dash-ready glow ring (human-controlled slimes)
  const human = s.isPlayer || mode==='2p' || mode==='online';
  if(human && s.dashCd===0){
    ctx.strokeStyle = 'rgba(255,255,255,.35)'; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r+4, Math.PI, 0); ctx.stroke();
  }
  // special-ready / armed aura
  if(human && (s.superReady || s.superArmed)){
    const pulse = 0.5 + 0.5*Math.sin(performance.now()/ (s.superArmed?90:220));
    ctx.save();
    ctx.shadowColor = '#ffb12e';
    ctx.shadowBlur = (s.superArmed ? 26 : 14) + pulse*10;
    ctx.strokeStyle = s.superArmed
      ? `rgba(255,140,30,${0.6+0.4*pulse})`
      : `rgba(255,200,70,${0.35+0.25*pulse})`;
    ctx.lineWidth = s.superArmed ? 6 : 4;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r+8, Math.PI, 0); ctx.stroke();
    ctx.restore();
  }
  // body — half-circle dome
  const g = ctx.createLinearGradient(s.x, s.y - s.r, s.x, s.y);
  g.addColorStop(0, col); g.addColorStop(1, rim);
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(s.x, s.y, s.r, Math.PI, 0);
  ctx.closePath(); ctx.fill();
  // rim light
  ctx.strokeStyle = 'rgba(255,255,255,.25)'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(s.x, s.y, s.r-1.5, Math.PI, 0); ctx.stroke();
  // eye that tracks the ball — the little character touch
  const ex = s.x + (s.isPlayer ? s.r*0.35 : -s.r*0.35);
  const ey = s.y - s.r*0.55;
  const a  = Math.atan2(ball.y - ey, ball.x - ex);
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(ex, ey, s.r*0.18, 0, 7); ctx.fill();
  ctx.fillStyle = '#10121a';
  ctx.beginPath(); ctx.arc(ex + Math.cos(a)*s.r*0.07, ey + Math.sin(a)*s.r*0.07, s.r*0.09, 0, 7); ctx.fill();
  // hat (player only)
  if(s.isPlayer) drawHat(s.x, s.y - s.r, s.r, looks.hat);
  ctx.restore();

  // charge meter (5 pips) floating above human slimes
  if(human){
    const pw = 12, gap = 3, total = SUPER_HITS*pw + (SUPER_HITS-1)*gap;
    let px = s.x - total/2, py = s.y - s.r - 22;
    for(let i=0;i<SUPER_HITS;i++){
      const filled = i < s.charge;
      ctx.fillStyle = s.superReady ? '#ffb12e' : (filled ? '#2dd4ff' : 'rgba(255,255,255,.18)');
      ctx.fillRect(px, py, pw, 6);
      px += pw + gap;
    }
  }
}

/* hats are drawn relative to the top of the dome at (cx, topY) */
function drawHat(cx, topY, r, hat, g=ctx){
  g.save();
  g.lineJoin = 'round';
  switch(hat){
    case 'band':
      g.fillStyle = '#ff3b6b';
      g.fillRect(cx - r*0.8, topY + r*0.18, r*1.6, r*0.16);
      break;
    case 'cap':
      g.fillStyle = '#2b7fff';
      g.beginPath(); g.arc(cx, topY + r*0.05, r*0.5, Math.PI, 0); g.fill();
      g.fillRect(cx, topY + r*0.0, r*0.7, r*0.12);   // brim
      break;
    case 'party':
      g.fillStyle = '#ffd24a';
      g.beginPath();
      g.moveTo(cx, topY - r*0.55); g.lineTo(cx - r*0.32, topY + r*0.05);
      g.lineTo(cx + r*0.32, topY + r*0.05); g.closePath(); g.fill();
      g.fillStyle = '#ff6bd6';
      g.beginPath(); g.arc(cx, topY - r*0.55, r*0.12, 0, 7); g.fill();
      break;
    case 'top':
      g.fillStyle = '#181425';
      g.fillRect(cx - r*0.6, topY - r*0.02, r*1.2, r*0.1);   // brim
      g.fillRect(cx - r*0.34, topY - r*0.55, r*0.68, r*0.55); // stack
      g.fillStyle = '#e0431f';
      g.fillRect(cx - r*0.34, topY - r*0.18, r*0.68, r*0.1);  // band
      break;
    case 'crown':
      g.fillStyle = '#ffd24a';
      g.beginPath();
      const b = topY + r*0.05, t = topY - r*0.4, x0 = cx - r*0.5;
      g.moveTo(x0, b);
      for(let i=0;i<=4;i++){ const x = x0 + i*r*0.25; g.lineTo(x, i%2? t : topY-r*0.12); }
      g.lineTo(x0 + r, b); g.closePath(); g.fill();
      break;
    // 'none' draws nothing
  }
  g.restore();
}

function drawBall(){
  // flame trail while a Super Shot is in flight
  if(ball.flameT > 0){
    const sp = Math.hypot(ball.vx, ball.vy) || 1;
    const ux = ball.vx/sp, uy = ball.vy/sp;
    ctx.save();
    for(let i=1;i<=6;i++){
      const t = i/6;
      const fx = ball.x - ux*ball.r*1.5*i, fy = ball.y - uy*ball.r*1.5*i;
      ctx.fillStyle = `rgba(255,${Math.round(170-t*120)},40,${(1-t)*0.55})`;
      ctx.beginPath(); ctx.arc(fx, fy, ball.r*(1.1-t*0.7), 0, 7); ctx.fill();
    }
    ctx.restore();
  }
  ctx.save();
  ctx.translate(ball.x, ball.y); ctx.rotate(ball.angle);
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(0,0,ball.r,0,7); ctx.fill();
  // panels so spin is visible
  ctx.fillStyle = '#14233a';
  ctx.beginPath(); ctx.arc(0,0,ball.r*0.34,0,7); ctx.fill();
  for(let i=0;i<5;i++){
    const an = i/5*Math.PI*2;
    ctx.beginPath();
    ctx.arc(Math.cos(an)*ball.r*0.62, Math.sin(an)*ball.r*0.62, ball.r*0.13, 0, 7);
    ctx.fill();
  }
  ctx.restore();
}

function drawGoal(side){
  const x0 = side==='left' ? 0 : W-NET_W;
  const top = GROUND_Y - GOAL_H;
  // net mesh
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,.16)'; ctx.lineWidth = 1;
  for(let gx=0; gx<=NET_W; gx+=8){
    ctx.beginPath(); ctx.moveTo(x0+gx, top); ctx.lineTo(x0+gx, GROUND_Y); ctx.stroke();
  }
  for(let gy=top; gy<=GROUND_Y; gy+=8){
    ctx.beginPath(); ctx.moveTo(x0, gy); ctx.lineTo(x0+NET_W, gy); ctx.stroke();
  }
  // frame: crossbar + back post
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 5; ctx.lineCap='round';
  const postX = side==='left' ? NET_W : W-NET_W;
  ctx.beginPath();
  ctx.moveTo(postX, GROUND_Y); ctx.lineTo(postX, top); ctx.lineTo(side==='left'?0:W, top);
  ctx.stroke();
  ctx.restore();
}

function drawPitch(){
  // sky already from CSS background; draw pitch + markings
  // grass stripes
  for(let i=0;i<10;i++){
    ctx.fillStyle = i%2 ? '#1c7a3c' : '#239149';
    ctx.fillRect(i*W/10, GROUND_Y, W/10+1, H-GROUND_Y);
  }
  // top edge line of pitch
  ctx.fillStyle = '#2aa257'; ctx.fillRect(0, GROUND_Y, W, 4);
  // centre line + halfway glow
  ctx.strokeStyle = 'rgba(255,255,255,.5)'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(MID, GROUND_Y - GOAL_H - 30); ctx.lineTo(MID, GROUND_Y); ctx.stroke();
}

function render(){
  ctx.clearRect(0,0,W,H);
  ctx.save();
  if(cheats.flip){ ctx.translate(W,0); ctx.scale(-1,1); }     // mirror the whole field
  if(cheats.quake) shake = Math.max(shake, 7);                // never-ending earthquake
  if(shake>0){ ctx.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake); shake*=0.85; if(shake<0.5)shake=0; }
  drawPitch();
  drawGoal('left'); drawGoal('right');
  drawSlime(player); drawSlime(cpu);
  drawBall();
  // disco mode — cycling colour wash (admin toy)
  if(cheats.disco){
    const hue = (performance.now()/12) % 360;
    ctx.fillStyle = `hsla(${hue},90%,55%,0.18)`;
    ctx.fillRect(0,0,W,H);
  }
  // goal flash
  if(goalFreeze>0 && (scoreYou>0||scoreCpu>0)){
    ctx.fillStyle = `rgba(255,255,255,${Math.min(.25, goalFreeze/220)})`;
    ctx.fillRect(0,0,W,H);
  }
  ctx.restore();
}

/* ======================================================================
   HUD + SHOP UI
   ====================================================================== */
const $ = id => document.getElementById(id);
function updateHUD(){
  $('score').innerHTML =
    `<span class="you">${scoreYou}</span><span class="dash">—</span><span class="cpu">${scoreCpu}</span>`;
  if(mode==='2p' || mode==='online'){
    $('coins').textContent = '';
    let label;
    if(mode==='online'){
      label = (netRole==='host' && !netConnected)
        ? `Online · Code ${netCode} — waiting…`
        : `Online · First to ${winScore}`;
    } else {
      label = `2 Players · First to ${winScore}`;
    }
    $('matchLabel').textContent = label + (padConnected ? '  🎮' : '');
  } else {
    $('coins').textContent = `🪙 ${coins}`;
    $('matchLabel').textContent =
      `Match ${matchNo} · ${DIFF[difficulty].label} · First to ${winScore}` + (padConnected ? '  🎮' : '');
  }
}

function buildShop(){
  const grid = $('shopGrid');
  grid.innerHTML = '';
  UPGRADES.forEach(u=>{
    const lvl = upg[u.key];
    const maxed = lvl >= u.max;
    const cost = u.cost(lvl);
    const pips = Array.from({length:u.max},(_,i)=>
      `<div class="pip ${i<lvl?'on':''}"></div>`).join('');
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="name"><span>${u.name}</span><span>${lvl}/${u.max}</span></div>
      <div class="pips">${pips}</div>
      <div class="desc">${u.desc}</div>
      <button class="buy ${maxed?'maxed':''}" ${maxed||coins<cost?'disabled':''}>
        ${maxed ? 'MAX' : `🪙 ${cost}`}
      </button>`;
    if(!maxed){
      card.querySelector('.buy').onclick = ()=>{
        if(coins >= cost){ coins -= cost; upg[u.key]++; refreshShop(); }
      };
    }
    grid.appendChild(card);
  });
}
function refreshShop(){ $('shopCoins').textContent = coins; buildShop(); buildLooks(); }

/* ---- cosmetics tab: colours + hats ----------------------------------- */
function buildLooks(){
  const colorRow = $('colorRow'), hatRow = $('hatRow');
  colorRow.innerHTML = ''; hatRow.innerHTML = '';

  COLORS.forEach(c=>{
    const owned = looks.ownedColors.has(c.key);
    const equipped = looks.color === c.key;
    const el = document.createElement('div');
    el.className = 'swatch' + (equipped?' equipped':'') + (owned?' owned':'') + (!owned&&coins<c.cost?' locked':'');
    el.innerHTML = `<div class="chip" style="background:linear-gradient(180deg,${c.color},${c.rim})"></div>
      <span>${c.name}</span>
      <span class="tag2">${equipped?'Worn':owned?'Equip':'🪙 '+c.cost}</span>`;
    el.onclick = ()=>{
      if(owned){ looks.color = c.key; refreshShop(); }
      else if(coins >= c.cost){ coins -= c.cost; looks.ownedColors.add(c.key); looks.color = c.key; refreshShop(); }
    };
    colorRow.appendChild(el);
  });

  HATS.forEach(h=>{
    const owned = looks.ownedHats.has(h.key);
    const equipped = looks.hat === h.key;
    const el = document.createElement('div');
    el.className = 'swatch' + (equipped?' equipped':'') + (owned?' owned':'') + (!owned&&coins<h.cost?' locked':'');
    el.innerHTML = `<div class="chip" id="hatprev-${h.key}" style="background:#241a44"></div>
      <span>${h.name}</span>
      <span class="tag2">${equipped?'Worn':owned?'Equip':'🪙 '+h.cost}</span>`;
    el.onclick = ()=>{
      if(owned){ looks.hat = h.key; refreshShop(); }
      else if(coins >= h.cost){ coins -= h.cost; looks.ownedHats.add(h.key); looks.hat = h.key; refreshShop(); }
    };
    hatRow.appendChild(el);
  });
  drawHatPreviews();
}

/* render a tiny preview of each hat into its swatch chip */
function drawHatPreviews(){
  HATS.forEach(h=>{
    if(h.key==='none') return;
    const host = document.getElementById('hatprev-'+h.key);
    if(!host) return;
    host.innerHTML = '';
    host.style.background = 'transparent';
    const c = document.createElement('canvas'); c.width = 30; c.height = 30;
    const x = c.getContext('2d');
    x.translate(0, 6);
    drawHat(15, 18, 22, h.key, x);   // draw into the preview context
    host.appendChild(c);
  });
}

function endMatch(){
  const p1won = scoreYou > scoreCpu;
  if(mode==='2p' || mode==='online'){
    // versus result — no shop, no coins
    $('resultText').textContent = p1won ? 'PLAYER 1 WINS!' : 'PLAYER 2 WINS!';

  } else {

    $('resultText').className = 'result ' + (p1won?'win':'lose');

function toggleConsole(){ consoleOpen ? closeConsole() : openConsole(); }
function openConsole(){
  consoleOpen = true;
  $('console').classList.remove('hidden');
  for(const k in raw) raw[k]=false;             // drop held keys so slimes stop while typing
  if(!$('consoleLog').dataset.init){
    logLine('Slime Soccer dev console — type "\\help" for commands.', 'ok');
    $('consoleLog').dataset.init = '1';
  }
  setTimeout(()=>$('consoleInput').focus(), 0);
}
function closeConsole(){ consoleOpen = false; $('console').classList.add('hidden'); $('consoleInput').blur(); }
function logLine(t, cls=''){
  const d = document.createElement('div'); if(cls) d.className = cls; d.textContent = t;
  const log = $('consoleLog'); log.appendChild(d); log.scrollTop = log.scrollHeight;
}
function baseR(s){ return s.isPlayer ? (BASE.r + upg.size*7) : BASE.r; }
function setSize(s, m){ s.sizeMul = m; s.r = baseR(s) * m; }

/* resolve a target word → list of slimes (null if the word isn't a target) */
function targetList(tok){
  switch(tok){
    case 'both': case 'all':                        return [player, cpu];
    case 'p1': case 'you': case 'me': case 'player': return [player];
    case 'p2': case 'cpu': case 'enemy': case 'opp': return [cpu];
    default: return null;
  }
}
/* pop a trailing target word off args; default to both slimes */
function popTarget(args){
  const t = targetList(args[args.length-1]);
  if(t){ args.pop(); return t; }
  return [player, cpu];
}
function who(T){ return T.length===2 ? 'both' : (T[0]===player ? 'P1' : 'P2'); }

function runCommand(text){
  let line = (text||'').trim(); if(!line) return;
  logLine('> ' + line, 'cmd');
  if(line[0] === '\\') line = line.slice(1).trim();   // commands are written with a leading backslash
  if(!line) return;
  const [cmd, ...args] = line.toLowerCase().split(/\s+/);
  const num = (v,d)=>{ const n = parseFloat(v); return isNaN(n) ? d : n; };
  const ok = m => logLine(m, 'ok');
  switch(cmd){
    case 'help':
      logLine('world:  \\bigball · \\smallball · \\ball <px> · \\bounce <x>');
      logLine('world:  \\moon · \\gravity <x> · \\slow · \\fast · \\time <x>');
      logLine('world:  \\disco · \\kick · \\freezeball · \\pause · \\score <a> <b>');
      logLine('match:  \\goals <n> · \\cpu <easy|med|hard> · \\win [t] · \\reset · \\list');
      logLine('target: \\giant · \\tiny · \\size <x> · \\speed <x> · \\jump <x>');
      logLine('target: \\super · \\freeze · \\fly · \\ghost · \\god');
      logLine('troll:  \\reverse · \\drunk · \\ice · \\troll · \\untroll  (target a friend!)');
      logLine('troll:  \\flip · \\quake  (whole screen)');
      logLine('   …add p1, p2, or both at the end, e.g.  \\troll p2');
      break;
    case 'bigball':   cheats.ballR = 42; if(ball) ball.r = 42; ok('ball is HUGE'); break;
    case 'smallball': cheats.ballR = 9;  if(ball) ball.r = 9;  ok('ball is tiny'); break;
    case 'ball': { const r = Math.max(4, Math.min(90, num(args[0],18))); cheats.ballR=r; if(ball) ball.r=r; ok('ball radius '+r); break; }
    case 'moon':    cheats.gravityMul = 0.3; ok('moon gravity'); break;
    case 'gravity': cheats.gravityMul = Math.max(0, Math.min(4, num(args[0],1))); ok('gravity x'+cheats.gravityMul); break;
    case 'slow':    cheats.timeScale = 0.4; ok('slow motion'); break;
    case 'fast':    cheats.timeScale = 2;   ok('fast forward'); break;
    case 'time':    cheats.timeScale = Math.max(0.1, Math.min(4, num(args[0],1))); ok('time x'+cheats.timeScale); break;
    case 'giant': { const T=popTarget(args); T.forEach(s=>setSize(s,1.7));  ok('GIANT ('+who(T)+')'); break; }
    case 'tiny':  { const T=popTarget(args); T.forEach(s=>setSize(s,0.55)); ok('tiny ('+who(T)+')'); break; }
    case 'size':  { const m=Math.max(0.3,Math.min(2.5,num(args[0],1))); const T=popTarget(args); T.forEach(s=>setSize(s,m)); ok('size x'+m+' ('+who(T)+')'); break; }
    case 'speed': { const m=Math.max(0.2,Math.min(4,num(args[0],1))); const T=popTarget(args); T.forEach(s=>s.speedMul=m); ok('speed x'+m+' ('+who(T)+')'); break; }
    case 'jump':  { const m=Math.max(0.2,Math.min(3,num(args[0],1))); const T=popTarget(args); T.forEach(s=>s.jumpMul=m); ok('jump x'+m+' ('+who(T)+')'); break; }
    case 'fly':   { const T=popTarget(args); const on=!T[0].fly;       T.forEach(s=>s.fly=on);       ok('fly '+(on?'ON':'OFF')+' ('+who(T)+')'); break; }
    case 'ghost': case 'invisible':
                  { const T=popTarget(args); const on=!T[0].invisible; T.forEach(s=>s.invisible=on); ok('invisible '+(on?'ON':'OFF')+' ('+who(T)+')'); break; }
    case 'super': { const T=popTarget(args); const on=!T[0].infSuper;  T.forEach(s=>s.infSuper=on);  ok('infinite super '+(on?'ON':'OFF')+' ('+who(T)+')'); break; }
    case 'freeze':{ const T=popTarget(args); const on=!T[0].frozen;    T.forEach(s=>s.frozen=on);    ok('freeze '+(on?'ON':'OFF')+' ('+who(T)+')'); break; }
    case 'god':   { const T=popTarget(args); T.forEach(s=>{ s.fly=true; s.infSuper=true; s.speedMul=1.6; setSize(s,1.4); }); ok('GOD MODE ('+who(T)+')'); break; }
    case 'reverse': { const T=popTarget(args); const on=!T[0].reversed; T.forEach(s=>s.reversed=on); ok('reversed controls '+(on?'ON':'OFF')+' ('+who(T)+')'); break; }
    case 'drunk':   { const T=popTarget(args); const on=!T[0].drunk;    T.forEach(s=>s.drunk=on);    ok('drunk mode '+(on?'ON':'OFF')+' ('+who(T)+')'); break; }
    case 'ice': case 'slip': { const T=popTarget(args); const on=!T[0].ice; T.forEach(s=>s.ice=on); ok('ice floor '+(on?'ON':'OFF')+' ('+who(T)+')'); break; }
    case 'flip':    cheats.flip  = !cheats.flip;  ok('screen flip '+(cheats.flip?'ON':'OFF')); break;
    case 'quake':   cheats.quake = !cheats.quake; ok('earthquake '+(cheats.quake?'ON':'OFF')); break;
    case 'troll':   { const T=popTarget(args); T.forEach(s=>{ s.reversed=true; s.ice=true; s.speedMul=0.55; setSize(s,0.6); }); ok('🤡 TROLLED ('+who(T)+')'); break; }
    case 'untroll': { const T=popTarget(args); T.forEach(s=>{ s.reversed=false; s.drunk=false; s.ice=false; s.speedMul=1; setSize(s,1); }); ok('un-trolled ('+who(T)+')'); break; }
    case 'disco':     cheats.disco = !cheats.disco; ok('disco: ' + (cheats.disco?'ON':'OFF')); break;
    case 'freezeball':cheats.ballFrozen = !cheats.ballFrozen; ok('ball frozen: ' + (cheats.ballFrozen?'ON':'OFF')); break;
    case 'bounce':    cheats.bounce = Math.max(0, Math.min(2, num(args[0],1))); ok('bounciness x'+cheats.bounce); break;
    case 'pause':     cheats.paused = !cheats.paused; ok(cheats.paused?'PAUSED':'resumed'); break;
    case 'kick':      if(ball){ ball.vx=(Math.random()-0.5)*40; ball.vy=-Math.random()*22-6; } ok('whack!'); break;
    case 'goals':     winScore = Math.max(1, Math.min(99, num(args[0],5)|0)); updateHUD(); ok('first to '+winScore); break;
    case 'cpu':
      { const d = {easy:'easy',med:'medium',medium:'medium',hard:'hard'}[args[0]];
        if(d){ difficulty=d; updateHUD(); ok('CPU difficulty: '+d); } else logLine('use: \\cpu easy|med|hard','err'); }
      break;
    case 'win':
      if(scene==='play'){ const T=popTarget(args); if(T[0]===cpu&&T.length===1) scoreCpu=winScore; else scoreYou=winScore; updateHUD(); endMatch(); ok('instant win'); }
      else logLine('start a match first','err');
      break;
    case 'list': {
      const on = [];
      if(cheats.gravityMul!==1) on.push('gravity x'+cheats.gravityMul);
      if(cheats.timeScale!==1)  on.push('time x'+cheats.timeScale);
      if(cheats.ballR!==18)     on.push('ball '+cheats.ballR);
      if(cheats.bounce!==1)     on.push('bounce x'+cheats.bounce);
      if(cheats.disco)          on.push('disco');
      if(cheats.ballFrozen)     on.push('ball frozen');
      if(cheats.paused)         on.push('paused');
      if(cheats.flip)           on.push('flipped');
      if(cheats.quake)          on.push('earthquake');
      if(winScore!==TARGET)     on.push('first to '+winScore);
      [['P1',player],['P2',cpu]].forEach(([n,s])=>{
        const f=[]; if(s.sizeMul!==1)f.push('size x'+s.sizeMul); if(s.speedMul!==1)f.push('speed x'+s.speedMul);
        if(s.jumpMul!==1)f.push('jump x'+s.jumpMul); if(s.fly)f.push('fly'); if(s.invisible)f.push('ghost');
        if(s.infSuper)f.push('super'); if(s.frozen)f.push('frozen');
        if(s.reversed)f.push('reversed'); if(s.drunk)f.push('drunk'); if(s.ice)f.push('ice');
        if(f.length) on.push(n+': '+f.join(', '));
      });
      logLine(on.length ? on.join('  |  ') : 'no cheats active', 'ok');
      break;
    }
    case 'score':
      if(scene==='play'){ scoreYou = Math.max(0, num(args[0],scoreYou)|0); scoreCpu = Math.max(0, num(args[1],scoreCpu)|0); updateHUD(); ok('score set to '+scoreYou+'–'+scoreCpu); }
      else logLine('start a match first', 'err');
      break;
    case 'reset':
      cheats.gravityMul=1; cheats.timeScale=1; cheats.ballR=18; cheats.disco=false;
      cheats.ballFrozen=false; cheats.bounce=1; cheats.paused=false; winScore=TARGET;
      cheats.flip=false; cheats.quake=false;
      if(ball) ball.r=18;
      for(const s of [player, cpu]){ s.infSuper=false; s.frozen=false; s.fly=false; s.invisible=false; s.speedMul=1; s.jumpMul=1; s.reversed=false; s.drunk=false; s.ice=false; setSize(s,1); }
      updateHUD(); ok('all cheats reset');
      break;
    case 'close': closeConsole(); break;
    default: logLine('unknown command: '+cmd+'   (try "help")', 'err');
  }
}
$('consoleInput').addEventListener('keydown', e=>{
  if(e.code==='Enter'){ runCommand(e.target.value); e.target.value=''; }

/* ======================================================================
   ONLINE  —  serverless WebRTC via Trystero, host-authoritative netcode
   The HOST simulates the match; the GUEST sends its buttons and renders
   the snapshots the host sends back.
   ====================================================================== */
function netStatus(t){ $('netStatus').textContent = t; }
function genCode(){
  const c = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; let s = '';
  for(let i=0;i<4;i++) s += c[Math.floor(Math.random()*c.length)];
  return s;
}
function startOnline(asHost, code){
  if(!window._trysteroJoin){ netStatus('Networking still loading — wait a few seconds and retry.'); return; }
  code = (code||'').toUpperCase();
  if(code.length<4){ netStatus('Type the 4-letter code first.'); return; }
  netRole = asHost ? 'host' : 'guest';
  mode = 'online';
  netConnected = false;
  netCode = code;
  try{
    room = window._trysteroJoin({ appId:'slime-soccer-leofattal-v1' }, code);
  }catch(e){ netStatus('Could not start networking: ' + e.message); return; }

  const inpAction = room.makeAction('inp');
  const stAction  = room.makeAction('st');
  sendInput = d => inpAction.send(d);
  sendState = d => stAction.send(d);
  // receiving data is itself proof a peer is connected (backup for onPeerJoin)
  inpAction.onMessage = d => { netGuestInput = d; if(!netConnected) onPeerHere(); };
  stAction.onMessage  = d => { if(!netConnected) onPeerHere(); applySnapshot(d); };

  function onPeerHere(){
    if(netConnected) return;
    netConnected = true;
    netStatus('Connected!');
    if(asHost) newMatch();          // fresh 0–0 once a friend actually joins
    updateHUD();
  }
  room.onPeerJoin  = () => onPeerHere();
  room.onPeerLeave = () => { netStatus('Other player left.'); toMenu(); };

  if(asHost){
    netStatus(`Your code is  ${code}  — share it. Waiting for a player…`);
    beginOnlineMatch();             // host plays immediately, so it never gets stuck waiting
  } else {
    netStatus(`Joining ${code}… (waiting for the host's game)`);
  }

  // if nobody connects in 15s, explain why
  setTimeout(()=>{
    if(netConnected || !room) return;
    netStatus(asHost
      ? `Code ${code}: still no one. Your friend picks Online, types ${code}, and taps JOIN.`
      : `No game found for ${code}. Make sure the host tapped HOST first and you typed the exact code. (Some strict wifi blocks the connection.)`);
  }, 15000);
}
function beginOnlineMatch(){
  player = makeSlime(W*0.25, getCSS('--p1'), getCSS('--p1-rim'), true);
  cpu    = makeSlime(W*0.75, getCSS('--p2'), getCSS('--p2-rim'), false);
  resetLooks();
  $('startScreen').classList.add('hidden');
  $('shopScreen').classList.add('hidden');
  newMatch();
  scene = 'play';
}
function sendGuestInput(){
  if(!sendInput) return;
  const i = inputFor(1);
  sendInput({ left:i.left, right:i.right, jump:i.jump, down:i.down, dash:i.dash, special:i.special });
}
function sendSnapshot(){
  if(!sendState) return;
  sendState({
    sc: scene,
    px:player.x, py:player.y, pr:player.r, pc:player.charge, ps:player.superReady?1:0, pa:player.superArmed?1:0,
    cx:cpu.x,    cy:cpu.y,    cr:cpu.r,    cc:cpu.charge,    cs:cpu.superReady?1:0,    ca:cpu.superArmed?1:0,
    bx:ball.x,   by:ball.y,   ba:ball.angle, br:ball.r, bf:ball.flameT,
    y:scoreYou,  o:scoreCpu,  d:cheats.disco?1:0, k:shake,
  });
}
function applySnapshot(d){
  // guest overwrites local render state with the host's authoritative state
  player.x=d.px; player.y=d.py; player.r=d.pr; player.charge=d.pc; player.superReady=!!d.ps; player.superArmed=!!d.pa;
  cpu.x=d.cx;    cpu.y=d.cy;    cpu.r=d.cr;    cpu.charge=d.cc;    cpu.superReady=!!d.cs;    cpu.superArmed=!!d.ca;
  ball.x=d.bx;   ball.y=d.by;   ball.angle=d.ba; ball.r=d.br; ball.flameT=d.bf;
  scoreYou=d.y;  scoreCpu=d.o;  cheats.disco=!!d.d; shake=Math.max(shake,d.k||0);
  if(guestScene!==d.sc){
    guestScene = d.sc;
    if(d.sc==='play'){ $('shopScreen').classList.add('hidden'); $('startScreen').classList.add('hidden'); scene='play'; }
    else if(d.sc==='shop'){ scene='shop'; showOnlineResult(); }
  }
  updateHUD();
}
function showOnlineResult(){
  const p1won = scoreYou > scoreCpu;
  $('resultText').textContent = p1won ? 'PLAYER 1 WINS!' : 'PLAYER 2 WINS!';
  $('resultText').className = 'result ' + (p1won?'win':'lose');
  $('earnText').textContent = `Final score ${scoreYou} — ${scoreCpu}`;
  $('coinWrap').classList.add('hidden');
  $('shopBody').classList.add('hidden');
  $('nextBtn').textContent = 'REMATCH';
  // only the host can start a rematch
  document.querySelector('#shopScreen .btn-row').style.display = (netRole==='guest') ? 'none' : '';
  $('shopScreen').classList.remove('hidden');
}
$('hostBtn').onclick = ()=>{ const code = genCode(); $('joinCode').value = code; startOnline(true, code); };
$('joinBtn').onclick = ()=>{ startOnline(false, ($('joinCode').value||'').trim()); };
$('joinCode').addEventListener('input', e=>{ e.target.value = e.target.value.toUpperCase(); });

/* ======================================================================
   MAIN LOOP  —  fixed timestep with accumulator
   ====================================================================== */
let last = performance.now(), acc = 0;
function frame(now){
  let dt = now - last; last = now;
  if(dt > 250) dt = 250;            // clamp after tab-switch so we don't spiral
  pollGamepads();                   // read controllers once per frame
  if(scene === 'play'){
    if(mode==='online' && netRole==='guest'){
      sendGuestInput();               // guest doesn't simulate — just sends its buttons
    } else if(!cheats.paused){
      acc += dt * cheats.timeScale;   // time-scale cheat (slow-mo / fast-forward)
      while(acc >= STEP){ physicsStep(); acc -= STEP; }
    }
  }
  if(mode==='online' && netRole==='host' && scene!=='start') sendSnapshot();
  render();
  requestAnimationFrame(frame);
}
// draw the start scene once, then run
resetLooks();
player = makeSlime(W*0.25, getCSS('--p1'), getCSS('--p1-rim'), true);
cpu    = makeSlime(W*0.75, getCSS('--p2'), getCSS('--p2-rim'), false);
ball   = { x:MID, y:140, vx:0, vy:0, r:18, angle:0, flameT:0 };
requestAnimationFrame(frame);
</script>
